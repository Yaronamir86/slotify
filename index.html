
<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MiniBooking SaaS Platform</title>
<style>
body{font-family:Arial;background:#f5f5f5;margin:0}
header{background:#111;color:#fff;padding:14px}
.container{max-width:1100px;margin:auto;padding:20px}
.card{background:#fff;padding:16px;border-radius:10px;margin-bottom:14px}
button{padding:10px 14px;border:none;border-radius:6px;background:#111;color:#fff;cursor:pointer}
input,select{padding:8px;width:100%;margin-top:4px;margin-bottom:10px}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.hidden{display:none}
.service{border:1px solid #ddd;padding:10px;border-radius:8px;margin-bottom:8px;cursor:pointer}
.selected{border:2px solid #111}
</style>
</head>
<body>

<header>
MiniBooking SaaS Platform
</header>

<div class="container">

<div id="platformView">
<div class="card">
<h2>Super Admin – כל העסקים</h2>
<button onclick="showCreateBusiness()">צור עסק חדש</button>
</div>

<div id="businessList"></div>
</div>

<div id="createBusinessView" class="hidden">
<div class="card">
<h2>יצירת עסק</h2>

שם העסק
<input id="bizName">

Slug (כתובת)
<input id="bizSlug">

<button onclick="createBusiness()">צור עסק</button>
<button onclick="backHome()">חזור</button>
</div>
</div>

<div id="businessAdminView" class="hidden">
<div class="card">
<h2 id="adminTitle"></h2>

<button onclick="openPublicPage()">פתח עמוד לקוחות</button>

<h3>שירותים</h3>

שם שירות
<input id="serviceName">

מחיר
<input id="servicePrice">

<button onclick="addService()">הוסף שירות</button>

<div id="servicesList"></div>

<button onclick="backHome()">חזור לפלטפורמה</button>

</div>
</div>

<div id="publicPageView" class="hidden">

<div class="card">
<h2 id="publicTitle"></h2>

<h3>בחר שירות</h3>

<div id="publicServices"></div>

<h3>שם לקוח</h3>
<input id="customerName">

<h3>שעה</h3>
<select id="slot">
<option>09:00</option>
<option>10:00</option>
<option>11:00</option>
<option>12:00</option>
<option>13:00</option>
<option>14:00</option>
</select>

<button onclick="book()">קבע תור</button>

</div>

<div class="card">
<h3>תורים שנקבעו</h3>
<div id="appointments"></div>
</div>

<button onclick="backHome()">חזור</button>

</div>

</div>

<script>

let businesses = JSON.parse(localStorage.getItem("biz")||"[]")
let currentBusiness=null
let selectedService=null

function save(){
localStorage.setItem("biz",JSON.stringify(businesses))
}

function renderBusinesses(){

let el=document.getElementById("businessList")
el.innerHTML=""

businesses.forEach(b=>{

let div=document.createElement("div")
div.className="card"

div.innerHTML=`
<h3>${b.name}</h3>
slug: ${b.slug}<br><br>

<button onclick="openAdmin('${b.slug}')">דשבורד עסק</button>
<button onclick="openPublic('${b.slug}')">עמוד לקוחות</button>
`

el.appendChild(div)

})

}

function showCreateBusiness(){

document.getElementById("platformView").classList.add("hidden")
document.getElementById("createBusinessView").classList.remove("hidden")

}

function createBusiness(){

let name=document.getElementById("bizName").value
let slug=document.getElementById("bizSlug").value

if(!name||!slug)return

businesses.push({
name,
slug,
services:[],
appointments:[]
})

save()

backHome()

}

function backHome(){

document.getElementById("platformView").classList.remove("hidden")
document.getElementById("createBusinessView").classList.add("hidden")
document.getElementById("businessAdminView").classList.add("hidden")
document.getElementById("publicPageView").classList.add("hidden")

renderBusinesses()

}

function openAdmin(slug){

currentBusiness=businesses.find(b=>b.slug==slug)

document.getElementById("platformView").classList.add("hidden")
document.getElementById("businessAdminView").classList.remove("hidden")

document.getElementById("adminTitle").innerText=currentBusiness.name

renderServices()

}

function addService(){

let name=document.getElementById("serviceName").value
let price=document.getElementById("servicePrice").value

currentBusiness.services.push({name,price})

save()

renderServices()

}

function renderServices(){

let el=document.getElementById("servicesList")
el.innerHTML=""

currentBusiness.services.forEach(s=>{

let div=document.createElement("div")
div.className="service"

div.innerHTML=`${s.name} - ₪${s.price}`

el.appendChild(div)

})

}

function openPublicPage(){

openPublic(currentBusiness.slug)

}

function openPublic(slug){

currentBusiness=businesses.find(b=>b.slug==slug)

document.getElementById("platformView").classList.add("hidden")
document.getElementById("publicPageView").classList.remove("hidden")

document.getElementById("publicTitle").innerText=currentBusiness.name

renderPublicServices()

renderAppointments()

}

function renderPublicServices(){

let el=document.getElementById("publicServices")
el.innerHTML=""

currentBusiness.services.forEach((s,i)=>{

let div=document.createElement("div")
div.className="service"

div.onclick=()=>{

selectedService=i

renderPublicServices()

}

if(selectedService==i)div.classList.add("selected")

div.innerHTML=`${s.name} - ₪${s.price}`

el.appendChild(div)

})

}

function book(){

let name=document.getElementById("customerName").value
let slot=document.getElementById("slot").value

if(!name||selectedService==null)return

let service=currentBusiness.services[selectedService]

currentBusiness.appointments.push({

name,
slot,
service:service.name

})

save()

renderAppointments()

}

function renderAppointments(){

let el=document.getElementById("appointments")
el.innerHTML=""

currentBusiness.appointments.forEach(a=>{

let div=document.createElement("div")
div.className="service"

div.innerHTML=`

${a.name}<br>
${a.service}<br>
${a.slot}

`

el.appendChild(div)

})

}

renderBusinesses()

</script>

</body>
</html>
