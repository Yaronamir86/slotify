<!DOCTYPE html><html lang="he" dir="rtl"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Booking</title><link rel="manifest" href="./manifest.json"><link rel="icon" href="./assets/icons/favicon.png" type="image/png"><style>
:root{--bg:#f6f8fb;--panel:#fff;--text:#0f172a;--muted:#64748b;--line:#e2e8f0;--brand:#0f172a;--brand2:#334155;--accent:#7c3aed;--ok:#166534;--danger:#b91c1c;--shadow:0 18px 60px rgba(15,23,42,.08);--r:22px;--max:1200px}
*{box-sizing:border-box}html,body{margin:0;padding:0}body{font-family:Arial,sans-serif;background:linear-gradient(180deg,#f8fafc,#eef2f7);color:var(--text)}
button,input,select,textarea{font:inherit}button{cursor:pointer}a{text-decoration:none;color:inherit}
.shell{width:min(var(--max),100%);margin:auto;padding:14px}.hidden{display:none!important}
.topbar{position:sticky;top:0;z-index:20;background:rgba(255,255,255,.85);backdrop-filter:blur(12px);border:1px solid var(--line);border-radius:20px;padding:12px;display:flex;align-items:center;justify-content:space-between;gap:12px;box-shadow:var(--shadow);margin-bottom:14px}
.brand{display:flex;align-items:center;gap:12px}.brand img{width:42px;height:42px;border-radius:14px;object-fit:cover}.brand h1{margin:0;font-size:1rem}.brand p{margin:4px 0 0;color:var(--muted);font-size:.85rem}
.actions{display:flex;gap:8px;flex-wrap:wrap}.btn,.btnGhost,.btnDanger,.pill{border:none;border-radius:14px;padding:11px 14px}.btn{background:linear-gradient(135deg,var(--brand),var(--brand2));color:#fff}.btnGhost,.pill{background:#fff;border:1px solid var(--line)}.btnDanger{background:#fff1f2;border:1px solid #fecdd3;color:var(--danger)}.pill{color:var(--muted);padding:8px 11px}
.grid2,.cards,.stats,.formGrid,.days,.slots{display:grid;gap:14px;grid-template-columns:1fr}.panel,.card,.hero{background:var(--panel);border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--shadow);padding:16px}.hero h1,.hero h2{margin:0 0 10px}.sub,.muted{color:var(--muted)}.sub{line-height:1.65}
.head{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:14px}.field{display:flex;flex-direction:column;gap:7px}.field label{color:var(--muted);font-size:.9rem}.field input,.field select,.field textarea{width:100%;padding:12px 13px;border:1px solid var(--line);border-radius:14px;background:#fff}.field textarea{min-height:90px;resize:vertical}
.item{background:#fff;border:1px solid var(--line);border-radius:18px;padding:14px}.selectable{cursor:pointer}.selected{outline:2px solid var(--brand)}.title{margin:0 0 8px}.row{display:flex;align-items:center;gap:10px;flex-wrap:wrap}.between{display:flex;align-items:center;justify-content:space-between;gap:10px}
.tag{display:inline-flex;align-items:center;border-radius:999px;padding:7px 10px;background:#f3f4f6;font-size:.82rem}.notice{background:#fff;border:1px solid var(--line);padding:12px 14px;border-radius:16px;color:var(--muted)}.notice.ok{background:#f0fdf4;border-color:#bbf7d0;color:var(--ok)}.notice.danger{background:#fef2f2;border-color:#fecaca;color:var(--danger)}
.tableWrap{overflow:auto}table{width:100%;min-width:700px;border-collapse:collapse}th,td{padding:12px 10px;border-bottom:1px solid var(--line);text-align:right}
.day,.slot{background:#fff;border:1px solid var(--line);border-radius:16px;padding:12px;text-align:center}.days{grid-template-columns:repeat(4,1fr)}.slots{grid-template-columns:repeat(2,1fr)}.sticky{position:sticky;bottom:10px;background:rgba(255,255,255,.92);border:1px solid var(--line);border-radius:20px;box-shadow:var(--shadow);padding:12px}
@media (min-width:760px){.grid2{grid-template-columns:repeat(2,1fr)}.cards{grid-template-columns:repeat(2,1fr)}.stats{grid-template-columns:repeat(4,1fr)}.formGrid{grid-template-columns:repeat(2,1fr)}.days{grid-template-columns:repeat(7,1fr)}.slots{grid-template-columns:repeat(4,1fr)}}
</style></head><body><div class="shell"><header class="topbar"><div class="brand"><img src="./assets/icons/logo.png"><div><h1 id="bizName">עמוד הזמנות</h1><p id="bizDesc">בחר שירות, עובד ושעה פנויה</p></div></div><div class="actions"><a href="index.html" class="btnGhost">כניסה</a></div></header><section class="grid2"><div class="panel"><div class="head"><h3>פרטי לקוח</h3></div><div class="formGrid"><div class="field"><label>שם מלא</label><input id="customerName"></div><div class="field"><label>טלפון</label><input id="customerPhone"></div><div class="field"><label>אימייל</label><input id="customerEmail"></div></div><div id="msg" class="notice hidden" style="margin-top:12px"></div></div><div class="panel"><div class="head"><h3>מידע</h3></div><div class="notice">העמוד הזה נטען דרך קישור עסק, למשל booking.html?b=moran-nails</div></div></section><section class="grid2" style="margin-top:14px"><div class="panel"><div class="head"><h3>1. שירות</h3></div><div id="services" class="cards"></div><div class="head" style="margin-top:14px"><h3>2. עובד</h3></div><div id="employees" class="cards"></div></div><div class="panel"><div class="head"><h3>3. יום ושעה</h3></div><div id="days" class="days"></div><div id="slots" class="slots" style="margin-top:10px"></div><div class="field" style="margin-top:14px"><label>הערה</label><textarea id="notes"></textarea></div><div class="sticky" style="margin-top:14px"><div class="between"><div><div class="title">סיכום הזמנה</div><div id="summary" class="sub">בחר שירות, עובד, יום ושעה.</div></div><div id="price" class="title">₪0</div></div><div class="row" style="margin-top:12px"><button id="bookBtn" class="btn">קבע תור</button><button id="resetBtn" class="btnGhost">איפוס</button></div></div></div></section></div><script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs, query, where } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";
const app = initializeApp({"apiKey":"AIzaSyDB_HEkwm97f7s7grMZ9yh15HrZywz5oiw","authDomain":"slotify-7bcb2.firebaseapp.com","projectId":"slotify-7bcb2","storageBucket":"slotify-7bcb2.firebasestorage.app","messagingSenderId":"709282957955","appId":"1:709282957955:web:c3f48cd81af74a7428e9b6","measurementId":"G-MR5TRPQRSF"}); const db = getFirestore(app);
const params = new URLSearchParams(location.search); const slug = params.get("b");
let businessId = null, business = null, services = [], employees = []; const state = {serviceId:null, employeeId:null, day:null, slot:null};
const DAYS = (()=>{const weekdays=["א׳","ב׳","ג׳","ד׳","ה׳","ו׳","ש׳"],months=["ינו׳","פבר׳","מרץ","אפר׳","מאי","יוני","יולי","אוג׳","ספט׳","אוק׳","נוב׳","דצ׳"],out=[],now=new Date();for(let i=0;i<21;i++){const d=new Date(now);d.setDate(now.getDate()+i);out.push({dateKey:d.toISOString().slice(0,10),label:weekdays[d.getDay()],title:`${d.getDate()} ${months[d.getMonth()]}`});}return out;})();
const el = id => document.getElementById(id), money = n => `₪${n}`;
function slots(start,end,interval){const out=[];let [sh,sm]=start.split(":").map(Number),[eh,em]=end.split(":").map(Number),cur=sh*60+sm,max=eh*60+em;while(cur<max){out.push(`${String(Math.floor(cur/60)).padStart(2,"0")}:${String(cur%60).padStart(2,"0")}`);cur+=Number(interval);}return out;}
function setMsg(text="", type=""){const box=el("msg"); if(!text){box.className="notice hidden"; box.textContent=""; return;} box.className=`notice ${type}`; box.textContent=text;}
function renderSummary(){const s=services.find(x=>x.id===state.serviceId), e=employees.find(x=>x.id===state.employeeId); const parts=[]; if(s) parts.push(s.name); if(e) parts.push(e.name); if(state.day&&state.slot) parts.push(`${state.day.title} · ${state.slot}`); el("summary").textContent = parts.length ? parts.join(" | ") : "בחר שירות, עובד, יום ושעה."; el("price").textContent = s ? money(s.price||0) : money(0);}
async function init(){const q=query(collection(db,"businesses"), where("slug","==",slug)); const snap=await getDocs(q); if(snap.empty){el("bizName").textContent="עסק לא נמצא"; el("bizDesc").textContent="בדוק את הקישור"; return;} const d=snap.docs[0]; businessId=d.id; business=d.data(); el("bizName").textContent=business.name||"עמוד הזמנות"; el("bizDesc").textContent=business.description||"בחר שירות, עובד ושעה פנויה"; const sSnap=await getDocs(collection(db,"businesses",businessId,"services")); const eSnap=await getDocs(collection(db,"businesses",businessId,"employees")); services=sSnap.docs.map(d=>({id:d.id,...d.data()})).sort((a,b)=>(a.name||"").localeCompare(b.name||"")); employees=eSnap.docs.map(d=>({id:d.id,...d.data()})).sort((a,b)=>(a.name||"").localeCompare(b.name||"")); renderServices(); renderEmployees(); renderDays(); renderSummary();}
function renderServices(){el("services").innerHTML=services.map(s=>`<div class="item selectable ${state.serviceId===s.id?"selected":""}" data-service="${s.id}"><div class="between"><h4 class="title">${s.name||""}</h4><span class="tag">${money(s.price||0)}</span></div><p class="sub">${s.description||""}</p><p class="sub">${s.duration||0} דק׳</p></div>`).join("")||`<div class="notice">אין שירותים זמינים.</div>`; document.querySelectorAll("[data-service]").forEach(btn=>btn.onclick=()=>{state.serviceId=btn.dataset.service; renderServices(); renderSummary();});}
function renderEmployees(){el("employees").innerHTML=employees.map(e=>`<div class="item selectable ${state.employeeId===e.id?"selected":""}" data-employee="${e.id}"><div class="between"><h4 class="title">${e.name||""}</h4><span class="tag">${e.role||""}</span></div></div>`).join("")||`<div class="notice">אין עובדים זמינים.</div>`; document.querySelectorAll("[data-employee]").forEach(btn=>btn.onclick=async()=>{state.employeeId=btn.dataset.employee; state.slot=null; renderEmployees(); renderSummary(); await renderSlots();});}
function renderDays(){el("days").innerHTML=DAYS.map(d=>`<div class="day selectable ${state.day?.dateKey===d.dateKey?"selected":""}" data-day="${d.dateKey}"><small>${d.label}</small><strong>${d.title}</strong></div>`).join(""); document.querySelectorAll("[data-day]").forEach(btn=>btn.onclick=async()=>{state.day=DAYS.find(d=>d.dateKey===btn.dataset.day); state.slot=null; renderDays(); renderSummary(); await renderSlots();});}
async function renderSlots(){if(!business||!state.day){el("slots").innerHTML=`<div class="notice">בחר יום כדי לראות שעות.</div>`; return;} const a=business.availability||{start:"09:00", end:"17:00", interval:30}; let free=slots(a.start,a.end,a.interval); if(state.employeeId){const q=query(collection(db,"businesses",businessId,"bookings"), where("dateKey","==",state.day.dateKey), where("employeeId","==",state.employeeId)); const snap=await getDocs(q); const taken=snap.docs.map(d=>d.data().slot); free=free.filter(s=>!taken.includes(s));} el("slots").innerHTML=free.length?free.map(s=>`<div class="slot selectable ${state.slot===s?"selected":""}" data-slot="${s}">${s}</div>`).join(""):`<div class="notice">אין שעות זמינות ביום הזה.</div>`; document.querySelectorAll("[data-slot]").forEach(btn=>btn.onclick=()=>{state.slot=btn.dataset.slot; renderSummary(); renderSlots();});}
el("bookBtn").onclick = async ()=>{const customerName=el("customerName").value.trim(), customerPhone=el("customerPhone").value.trim(), customerEmail=el("customerEmail").value.trim(), service=services.find(s=>s.id===state.serviceId), employee=employees.find(e=>e.id===state.employeeId); if(!customerName||!customerPhone) return setMsg("יש למלא שם וטלפון.","danger"); if(!service||!employee||!state.day||!state.slot) return setMsg("יש לבחור שירות, עובד, יום ושעה.","danger"); await addDoc(collection(db,"businesses",businessId,"bookings"),{customerName,customerPhone,customerEmail,serviceId:service.id,serviceName:service.name,employeeId:employee.id,employeeName:employee.name,dateKey:state.day.dateKey,dateLabel:state.day.title,slot:state.slot,notes:el("notes").value.trim()}); setMsg("התור נקבע בהצלחה.","ok"); ["customerName","customerPhone","customerEmail","notes"].forEach(id=>el(id).value=""); state.slot=null; await renderSlots(); renderSummary();};
el("resetBtn").onclick = ()=>{state.serviceId=null; state.employeeId=null; state.day=null; state.slot=null; renderServices(); renderEmployees(); renderDays(); el("slots").innerHTML=`<div class="notice">בחר יום כדי לראות שעות.</div>`; renderSummary(); setMsg("");};
await init();
</script></body></html>
